[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: all routes (/en/dashboard, /ar/users, etc.) serve index.html
# status = 200 keeps the URL intact so React Router handles routing client-side
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
