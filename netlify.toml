[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_BASE_URL = "https://api.rezervitoo.com/api/v1"
  VITE_WS_BASE_URL = "wss://api.rezervitoo.com"
  
# SPA fallback: all routes (/en/dashboard, /ar/users, etc.) serve index.html
# status = 200 keeps the URL intact so React Router handles routing client-side
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
